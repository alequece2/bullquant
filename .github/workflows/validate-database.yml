name: Validate Database Health

on:
  schedule:
    # Corre todos os Domingos às 06:00 UTC (depois da ingestão)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Permite correr manualmente no GitHub

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Database Validation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npx prisma generate
          npx tsx scripts/validate_database.ts

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: database-health-report
          path: database_health_report.md
